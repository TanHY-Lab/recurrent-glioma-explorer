<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recurrent Glioma Multi-Omics Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --nasa-blue: #0B3D91;
        --nasa-red: #FC3D21;
        --nasa-dark: #060714;
        --bg-panel: #0a1628;
        --bg-panel-hover: #0f1d35;
        --accent: #FC3D21;
        --accent-dim: rgba(252, 61, 33, 0.12);
        --accent-border: rgba(252, 61, 33, 0.3);
        --blue-dim: rgba(11, 61, 145, 0.2);
        --blue-border: rgba(11, 61, 145, 0.4);
        --text-primary: #e8edf5;
        --text-secondary: #a8b8d0;
        --text-muted: #5a6a8a;
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--nasa-dark);
        color: var(--text-primary);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      #app {
        position: relative;
        z-index: 1;
        min-height: 100vh;
      }

      /* Element Plus dark theme — NASA style */
      .el-table {
        --el-table-border-color: var(--blue-border) !important;
        --el-table-header-bg-color: rgba(11, 61, 145, 0.15) !important;
        --el-table-bg-color: var(--bg-panel) !important;
        --el-table-tr-bg-color: var(--bg-panel) !important;
        --el-table-row-hover-bg-color: var(--bg-panel-hover) !important;
        --el-table-header-text-color: var(--nasa-red) !important;
        --el-table-text-color: var(--text-primary) !important;
        --el-table-expanded-cell-bg-color: #080e1e !important;
        font-size: 13px !important;
        border: 1px solid var(--blue-border) !important;
        border-radius: 2px !important;
      }
      .el-table th.el-table__cell { font-weight: 700 !important; text-transform: uppercase !important; font-size: 11px !important; letter-spacing: 0.1em !important; padding: 12px 14px !important; background: rgba(11, 61, 145, 0.15) !important; }
      .el-table td.el-table__cell { padding: 10px 14px !important; border-bottom: 1px solid rgba(11, 61, 145, 0.15) !important; }
      .el-table--enable-row-hover .el-table__body tr:hover > td { background-color: var(--bg-panel-hover) !important; }
      .el-table--striped .el-table__body tr.el-table__row--striped td.el-table__cell { background: rgba(11, 61, 145, 0.06) !important; }

      .el-input__wrapper { background: var(--bg-panel) !important; box-shadow: 0 0 0 1px var(--blue-border) inset !important; border-radius: 2px !important; }
      .el-input__wrapper:focus-within { box-shadow: 0 0 0 1px var(--nasa-red) inset, 0 0 0 3px rgba(252, 61, 33, 0.1) !important; }
      .el-input__inner { color: var(--text-primary) !important; }
      .el-input__inner::placeholder { color: var(--text-muted) !important; }
      .el-input .el-input__prefix .el-icon { color: var(--text-muted) !important; }

      .el-select .el-select__wrapper { background: var(--bg-panel) !important; box-shadow: 0 0 0 1px var(--blue-border) inset !important; color: var(--text-primary) !important; border-radius: 2px !important; }
      .el-select .el-select__wrapper.is-focused { box-shadow: 0 0 0 1px var(--nasa-red) inset !important; }
      .el-select .el-select__placeholder { color: var(--text-muted) !important; }
      .el-select .el-select__selected-item .el-tag { background: var(--accent-dim) !important; color: var(--nasa-red) !important; border-color: var(--accent-border) !important; }

      .el-tag { border-radius: 2px !important; font-size: 11px !important; font-weight: 700 !important; letter-spacing: 0.04em !important; text-transform: uppercase !important; }
      .el-tag--primary { background: var(--blue-dim) !important; color: #6a9fff !important; border-color: var(--blue-border) !important; }
      .el-tag--success { background: rgba(0,180,120,0.12) !important; color: #00e68a !important; border-color: rgba(0,180,120,0.3) !important; }
      .el-tag--warning { background: rgba(255,170,0,0.12) !important; color: #ffaa00 !important; border-color: rgba(255,170,0,0.3) !important; }
      .el-tag--info { background: rgba(136,146,176,0.12) !important; color: #a0aac0 !important; border-color: rgba(136,146,176,0.2) !important; }
      .el-tag--danger { background: var(--accent-dim) !important; color: var(--nasa-red) !important; border-color: var(--accent-border) !important; }

      .el-button--primary { background-color: var(--nasa-red) !important; border-color: var(--nasa-red) !important; color: #fff !important; font-weight: 700 !important; border-radius: 2px !important; letter-spacing: 0.05em !important; text-transform: uppercase !important; }
      .el-button--primary:hover { background-color: #e0321a !important; border-color: #e0321a !important; }
      .el-button--default { background: var(--bg-panel) !important; border-color: var(--blue-border) !important; color: var(--text-secondary) !important; border-radius: 2px !important; }
      .el-button--default:hover { border-color: var(--nasa-red) !important; color: var(--nasa-red) !important; }

      .el-pagination { --el-pagination-bg-color: transparent !important; --el-pagination-text-color: var(--text-secondary) !important; --el-pagination-button-bg-color: var(--bg-panel) !important; --el-pagination-button-color: var(--text-secondary) !important; --el-pagination-hover-color: var(--nasa-red) !important; }
      .el-pagination .el-pager li.is-active { background: var(--nasa-red) !important; color: #fff !important; border-radius: 2px !important; font-weight: 700 !important; }
      .el-pagination .el-pager li { background: var(--bg-panel) !important; color: var(--text-secondary) !important; border-radius: 2px !important; }
      .el-pagination .btn-prev, .el-pagination .btn-next { background: var(--bg-panel) !important; color: var(--text-secondary) !important; }

      .el-switch.is-checked .el-switch__core { background-color: var(--nasa-red) !important; border-color: var(--nasa-red) !important; }
      .el-switch .el-switch__core { background: var(--bg-panel) !important; border-color: var(--blue-border) !important; }

      .el-select-dropdown { background: var(--bg-panel) !important; border: 1px solid var(--blue-border) !important; }
      .el-select-dropdown__item { color: var(--text-primary) !important; }
      .el-select-dropdown__item.is-hovering { background: var(--bg-panel-hover) !important; }
      .el-select-dropdown__item.is-selected { color: var(--nasa-red) !important; font-weight: 700 !important; }
      .el-popper.is-light { background: var(--bg-panel) !important; border: 1px solid var(--blue-border) !important; }
      .el-popper.is-light .el-popper__arrow::before { background: var(--bg-panel) !important; border-color: var(--blue-border) !important; }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--nasa-dark); }
      ::-webkit-scrollbar-thumb { background: rgba(11, 61, 145, 0.4); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(252, 61, 33, 0.5); }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
