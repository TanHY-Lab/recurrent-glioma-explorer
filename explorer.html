<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recurrent Glioma Multi-Omics Explorer</title>
    <style>
      :root {
        --bg-deep: #0a0e27;
        --bg-card: #131a3e;
        --bg-card-hover: #1a2350;
        --accent: #00d4aa;
        --accent-dim: rgba(0, 212, 170, 0.15);
        --accent-border: rgba(0, 212, 170, 0.25);
        --text-primary: #e8edf5;
        --text-secondary: #8892b0;
        --text-muted: #4a5580;
        --border: rgba(0, 212, 170, 0.12);
      }

      * { margin: 0; padding: 0; box-sizing: border-box; }

      html, body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: var(--bg-deep);
        color: var(--text-primary);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background-image:
          linear-gradient(rgba(0, 212, 170, 0.02) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0, 212, 170, 0.02) 1px, transparent 1px);
        background-size: 60px 60px;
        pointer-events: none;
        z-index: 0;
      }

      #app {
        position: relative;
        z-index: 1;
        min-height: 100vh;
      }

      /* Element Plus dark theme overrides */
      .el-table { --el-table-border-color: rgba(0,212,170,0.1) !important; --el-table-header-bg-color: #0f1535 !important; --el-table-bg-color: var(--bg-card) !important; --el-table-tr-bg-color: var(--bg-card) !important; --el-table-row-hover-bg-color: var(--bg-card-hover) !important; --el-table-header-text-color: var(--accent) !important; --el-table-text-color: var(--text-primary) !important; --el-table-expanded-cell-bg-color: #0f1535 !important; font-size: 13px !important; border: 1px solid rgba(0,212,170,0.1) !important; border-radius: 6px !important; }
      .el-table th.el-table__cell { font-weight: 600 !important; text-transform: uppercase !important; font-size: 11px !important; letter-spacing: 0.06em !important; padding: 12px 14px !important; background: #0f1535 !important; }
      .el-table td.el-table__cell { padding: 10px 14px !important; border-bottom: 1px solid rgba(0,212,170,0.06) !important; }
      .el-table--enable-row-hover .el-table__body tr:hover > td { background-color: var(--bg-card-hover) !important; }

      .el-input__wrapper { background: var(--bg-card) !important; box-shadow: 0 0 0 1px rgba(0,212,170,0.15) inset !important; }
      .el-input__wrapper:focus-within { box-shadow: 0 0 0 1px var(--accent) inset, 0 0 0 3px rgba(0,212,170,0.1) !important; }
      .el-input__inner { color: var(--text-primary) !important; }
      .el-input__inner::placeholder { color: var(--text-muted) !important; }
      .el-input .el-input__prefix .el-icon { color: var(--text-muted) !important; }

      .el-select .el-select__wrapper { background: var(--bg-card) !important; box-shadow: 0 0 0 1px rgba(0,212,170,0.15) inset !important; color: var(--text-primary) !important; }
      .el-select .el-select__wrapper.is-focused { box-shadow: 0 0 0 1px var(--accent) inset !important; }
      .el-select .el-select__placeholder { color: var(--text-muted) !important; }
      .el-select .el-select__selected-item .el-tag { background: var(--accent-dim) !important; color: var(--accent) !important; border-color: var(--accent-border) !important; }

      .el-tag { border-radius: 3px !important; font-size: 11px !important; font-weight: 600 !important; letter-spacing: 0.02em !important; }
      .el-tag--primary { background: var(--accent-dim) !important; color: var(--accent) !important; border-color: var(--accent-border) !important; }
      .el-tag--success { background: rgba(0,180,120,0.15) !important; color: #00e68a !important; border-color: rgba(0,180,120,0.3) !important; }
      .el-tag--warning { background: rgba(255,170,0,0.15) !important; color: #ffaa00 !important; border-color: rgba(255,170,0,0.3) !important; }
      .el-tag--info { background: rgba(136,146,176,0.15) !important; color: #a0aac0 !important; border-color: rgba(136,146,176,0.25) !important; }
      .el-tag--danger { background: rgba(255,80,80,0.15) !important; color: #ff6666 !important; border-color: rgba(255,80,80,0.3) !important; }

      .el-button--primary { background-color: var(--accent) !important; border-color: var(--accent) !important; color: #0a0e27 !important; font-weight: 600 !important; border-radius: 4px !important; }
      .el-button--primary:hover { background-color: #00e6b8 !important; border-color: #00e6b8 !important; }
      .el-button--default { background: var(--bg-card) !important; border-color: rgba(0,212,170,0.2) !important; color: var(--text-secondary) !important; }
      .el-button--default:hover { border-color: var(--accent) !important; color: var(--accent) !important; }

      .el-pagination { --el-pagination-bg-color: transparent !important; --el-pagination-text-color: var(--text-secondary) !important; --el-pagination-button-bg-color: var(--bg-card) !important; --el-pagination-button-color: var(--text-secondary) !important; --el-pagination-hover-color: var(--accent) !important; }
      .el-pagination .el-pager li.is-active { background: var(--accent) !important; color: #0a0e27 !important; border-radius: 4px !important; font-weight: 700 !important; }
      .el-pagination .el-pager li { background: var(--bg-card) !important; color: var(--text-secondary) !important; border-radius: 4px !important; }
      .el-pagination .btn-prev, .el-pagination .btn-next { background: var(--bg-card) !important; color: var(--text-secondary) !important; }

      .el-switch.is-checked .el-switch__core { background-color: var(--accent) !important; border-color: var(--accent) !important; }
      .el-switch .el-switch__core { background: var(--bg-card) !important; border-color: rgba(0,212,170,0.2) !important; }

      .el-select-dropdown { background: var(--bg-card) !important; border: 1px solid rgba(0,212,170,0.15) !important; }
      .el-select-dropdown__item { color: var(--text-primary) !important; }
      .el-select-dropdown__item.is-hovering { background: var(--bg-card-hover) !important; }
      .el-select-dropdown__item.is-selected { color: var(--accent) !important; font-weight: 600 !important; }
      .el-popper.is-light { background: var(--bg-card) !important; border: 1px solid rgba(0,212,170,0.15) !important; }
      .el-popper.is-light .el-popper__arrow::before { background: var(--bg-card) !important; border-color: rgba(0,212,170,0.15) !important; }

      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg-deep); }
      ::-webkit-scrollbar-thumb { background: rgba(0,212,170,0.2); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0,212,170,0.4); }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
